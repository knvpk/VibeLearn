# vibe_learn configuration — copy this file to your project root as vibe_learn.config.yaml
# and fill in the values for your topic and preferred layout.

# The subject area — used in introductions and curriculum references
topic: "<Your Topic Here>"   # e.g. "Agentic AI Engineering", "Systems Programming", "ML Fundamentals"

wiki:
  # Root directory for all wiki files
  root: wiki/

  # Concept map — phases and topics listed with [[wikilinks]], organized by phase.
  # The LLM reads this to determine concept order and check what exists before teaching or ingesting.
  index_file: wiki/index.md

  # Phase ordering, durations, and prerequisites
  plan_file: wiki/_plan.md

  # Append-only log of all ingest, query, and lint operations
  log_file: wiki/log.md

  # Per-concept folders (flat — never nested, even for subtopics)
  concepts_dir: wiki/concepts/

  # Source nodes — one .md per article, paper, video, or docs page
  sources_dir: wiki/sources/

  # Author nodes — one .md per person
  authors_dir: wiki/authors/

  # Tool nodes — one .md per tool, library, framework, or service
  tools_dir: wiki/tools/

  # Workflow nodes — one .md per executable process or step-by-step guide
  # Workflows answer "how do I execute Y"; concepts answer "what is X"
  workflows_dir: wiki/workflows/

  # Schemas — the LLM reads these before writing any frontmatter
  # Point these at copies of assets/schemas/ placed in your project
  concept_schema: schemas/concept_meta.json
  source_schema: schemas/source_meta.json
  author_schema: schemas/author_meta.json
  tool_schema: schemas/tool_meta.json
  workflow_schema: schemas/workflow_meta.json

audience:
  # Who this content is written for — shapes explanation depth and assumed knowledge
  role: "<Your Audience Role>"   # e.g. "software engineer", "data scientist", "student", "product manager"

  # Experience level — controls jargon density, analogy style, and example complexity
  level: "<Level>"   # "beginner" | "intermediate" | "advanced" | "expert"

  # Domain knowledge the audience already has — LLM won't re-explain these
  prior_knowledge:
    - "<Domain1>"   # e.g. "Python basics", "REST APIs", "linear algebra"
    - "<Domain2>"

  # Goals the audience is trying to accomplish — keeps explanations outcome-oriented
  goals:
    - "<Goal1>"   # e.g. "build production RAG pipelines", "pass a certification exam"
    - "<Goal2>"

examples:
  # Language for all code examples
  language: Python   # e.g. "Python", "TypeScript", "Go", "Rust"

  # Primary framework for the domain — used when the concept relates to it
  framework: "<Your Framework>"   # e.g. "FastAPI", "React", "LangChain", "PyTorch"

  # Idiomatic patterns to prefer when illustrating framework concepts
  idioms:
    - "<Pattern1>"   # e.g. class names, decorators, core primitives your framework uses
    - "<Pattern2>"
    - "<Pattern3>"
