# vibe_learn configuration — copy this file to your project root as vibe_learn.config.yaml
# and fill in the values for your topic and preferred layout.

# The subject area — used in introductions and curriculum references
topic: "<Your Topic Here>"   # e.g. "Agentic AI Engineering", "Systems Programming", "ML Fundamentals"

wiki:
  # Root directory — all paths are derived by convention:
  #   index.md, concepts/, sources/, authors/, tools/, workflows/, .state/
  root: wiki/

audience:
  # Who this content is written for — shapes explanation depth and assumed knowledge
  role: "<Your Audience Role>"   # e.g. "software engineer", "data scientist", "student", "product manager"

  # Experience level — controls jargon density, analogy style, and example complexity
  level: "<Level>"   # "beginner" | "intermediate" | "advanced" | "expert"

  # Domain knowledge the audience already has — LLM won't re-explain these
  prior_knowledge:
    - "<Domain1>"   # e.g. "Python basics", "REST APIs", "linear algebra"
    - "<Domain2>"

  # Goals the audience is trying to accomplish — keeps explanations outcome-oriented
  goals:
    - "<Goal1>"   # e.g. "build production RAG pipelines", "pass a certification exam"
    - "<Goal2>"

examples:
  # Language for all code examples
  language: Python   # e.g. "Python", "TypeScript", "Go", "Rust"

  # Primary framework for the domain — used when the concept relates to it
  framework: "<Your Framework>"   # e.g. "FastAPI", "React", "LangChain", "PyTorch"

  # Idiomatic patterns to prefer when illustrating framework concepts
  idioms:
    - "<Pattern1>"   # e.g. class names, decorators, core primitives your framework uses
    - "<Pattern2>"
    - "<Pattern3>"

ingest:
  # Maximum number of distinct concepts from a single source before asking which to prioritize
  max_concepts_before_ask: 3

  # Prompt user to create an author node when a new author is encountered during ingest
  auto_propose_author: true

  # How to handle procedural sources (tutorials, how-tos, recipes)
  detect_workflows: ask   # "ask" | "always" | "never"

output:
  # Default format for all diagrams
  diagram_format: mermaid   # "mermaid" | "d2" | "svg"
